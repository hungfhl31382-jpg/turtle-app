<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtle - Ứng dụng học ngôn ngữ cao cấp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/lucide@0.462.0" defer></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen font-sans antialiased transition-colors duration-300 selection:bg-brand-100 selection:text-brand-900 dark:selection:bg-brand-500/30 dark:selection:text-zinc-50">

    <!-- MÀN HÌNH ĐĂNG NHẬP / ĐĂNG KÝ: hiện khi chưa xác thực, ẩn hết app phía sau -->
    <div id="auth-screen" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-slate-50 dark:bg-zinc-950 p-4"></div>

    <!-- Toàn bộ app chính: chỉ hiện sau khi đăng nhập thành công -->
    <div id="app-root" class="hidden">
    <div class="flex h-screen overflow-hidden">

        <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-zinc-900 border-r border-slate-100 dark:border-zinc-800 p-5 justify-between z-20">
            <div class="space-y-6">
                <div class="flex items-center gap-3 px-2 cursor-pointer" onclick="switchPage('dashboard')">
                    <div class="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-500/20">
                        <i data-lucide="turtle" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-none">Turtle</h1>
                        <span class="text-xs text-slate-400 dark:text-zinc-500 font-medium">Học sâu, nhớ lâu</span>
                    </div>
                </div>

                <button onclick="switchPage('create-set')" class="w-full bg-slate-900 hover:bg-slate-800 dark:bg-brand-500 dark:hover:bg-brand-600 text-white font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-sm active:scale-[0.98]">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>Tạo bộ thẻ mới</span>
                </button>

                <nav class="space-y-1" id="desktop-nav">
                    <button onclick="switchPage('dashboard')" data-nav="dashboard" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-brand-500 bg-brand-50 dark:bg-brand-500/10">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Giao diện chính
                    </button>
                    <button onclick="switchPage('library')" data-nav="library" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                        <i data-lucide="folder-heart" class="w-4 h-4"></i> Thư viện của tôi
                    </button>
                    <button onclick="switchPage('spaced-repetition')" data-nav="spaced-repetition" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                        <i data-lucide="calendar-clock" class="w-4 h-4"></i> Spaced Repetition
                    </button>
                    <button onclick="switchPage('study-calendar')" data-nav="study-calendar" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                        <i data-lucide="calendar-days" class="w-4 h-4"></i> Lịch học
                    </button>
                    <button onclick="switchPage('analytics')" data-nav="analytics" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Thống kê & Streak
                    </button>
                </nav>
            </div>

            <div class="space-y-2 border-t border-slate-100 dark:border-zinc-800 pt-4">
                <div id="account-info" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-50 dark:bg-zinc-800/60 text-xs text-slate-500 dark:text-zinc-400 truncate">
                    <i data-lucide="user-circle" class="w-4 h-4 shrink-0"></i>
                    <span id="account-email" class="truncate">...</span>
                </div>
                <button onclick="toggleDarkMode()" class="w-full flex items-center justify-between px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                    <div class="flex items-center gap-3">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                        <span>Chế độ tối</span>
                    </div>
                    <div class="w-8 h-4 bg-slate-200 dark:bg-brand-500 rounded-full relative transition-colors">
                        <div id="dark-mode-dot" class="w-3 h-3 bg-white rounded-full absolute top-0.5 left-0.5 dark:left-4.5 transition-all"></div>
                    </div>
                </button>
                <button onclick="switchPage('settings')" data-nav="settings" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i> Cài đặt hệ thống
                </button>
                <button onclick="signOutUser()" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-50/50 dark:bg-zinc-950 relative">

            <header class="h-16 border-b border-slate-100 dark:border-zinc-900 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md flex items-center justify-between px-6 shrink-0 z-10">
                <div class="flex items-center gap-4 w-1/3">
                    <div class="relative w-full max-w-xs hidden sm:block">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input id="global-search" type="text" oninput="handleGlobalSearch(this.value)" placeholder="Tìm kiếm bộ thẻ..." class="w-full pl-9 pr-4 py-1.5 text-sm bg-slate-50 dark:bg-zinc-800 rounded-xl border-none focus:ring-2 focus:ring-brand-500/20 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5 bg-orange-50 dark:bg-orange-500/10 text-orange-600 px-3 py-1 rounded-full text-sm font-semibold border border-orange-100 dark:border-orange-500/20">
                        <i data-lucide="flame" class="w-4 h-4 fill-orange-500"></i>
                        <span id="streak-counter">5 Ngày</span>
                    </div>

                    <button onclick="showToast('Hệ thống Turtle đã sẵn sàng bứt phá mục tiêu!', 'shield-check')" class="p-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-zinc-800 rounded-xl relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full"></span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6" id="scroll-container">
                <div id="page-content" class="max-w-7xl w-full mx-auto page-fade">
                    </div>
            </div>

            <nav class="md:hidden bg-white dark:bg-zinc-900 border-t border-slate-100 dark:border-zinc-800 px-4 py-2 flex justify-around items-center shrink-0 shadow-xl z-20" id="mobile-nav">
                <button onclick="switchPage('dashboard')" data-nav="dashboard" class="flex flex-col items-center gap-1 text-brand-500"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px] font-medium">Trang chủ</span></button>
                <button onclick="switchPage('library')" data-nav="library" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="folder-heart" class="w-5 h-5"></i><span class="text-[10px] font-medium">Thư viện</span></button>
                <button onclick="switchPage('study-calendar')" data-nav="study-calendar" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="calendar-days" class="w-5 h-5"></i><span class="text-[10px] font-medium">Lịch học</span></button>
                <button onclick="switchPage('create-set')" data-nav="create-set" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="plus-circle" class="w-5 h-5"></i><span class="text-[10px] font-medium">Tạo mới</span></button>
                <button onclick="switchPage('settings')" data-nav="settings" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[10px] font-medium">Cài đặt</span></button>
            </nav>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>
    <div id="modal-container"></div>
    </div><!-- /#app-root -->

    <script src="./script.js" defer></script>
</body>
</html>
